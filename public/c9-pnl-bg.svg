<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 1600 600" fill="none">
  <defs>
    <linearGradient id="rm_bg" x1="0" y1="0" x2="1600" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0A0C" />
      <stop offset="0.55" stop-color="#0D0D0F" />
      <stop offset="1" stop-color="#09090B" />
    </linearGradient>

    <radialGradient id="rm_glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1350 200) rotate(135) scale(400 360)">
      <stop stop-color="#0EE957" stop-opacity="0.06" />
      <stop offset="1" stop-color="#0EE957" stop-opacity="0" />
    </radialGradient>

    <pattern id="rm_lines" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(25)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1600" height="600" fill="url(#rm_bg)" />
  <circle cx="1350" cy="200" r="420" fill="url(#rm_glow)" />
  <rect x="800" y="0" width="800" height="600" fill="url(#rm_lines)" opacity="0.15" />
</svg>
