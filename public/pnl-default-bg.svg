<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 1600 600" fill="none">
  <defs>
    <linearGradient id="rm_bg2" x1="0" y1="0" x2="1600" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0A0C" />
      <stop offset="0.5" stop-color="#0D0D10" />
      <stop offset="1" stop-color="#07070A" />
    </linearGradient>

    <radialGradient id="rm_center_glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 290) rotate(120) scale(760 620)">
      <stop stop-color="#0EA5E9" stop-opacity="0.20" />
      <stop offset="0.55" stop-color="#0EE957" stop-opacity="0.14" />
      <stop offset="1" stop-color="#0EA5E9" stop-opacity="0" />
    </radialGradient>

    <pattern id="rm_dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#FFFFFF" fill-opacity="0.08" />
    </pattern>

    <linearGradient id="rm_vignette2" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#000000" stop-opacity="0.75" />
      <stop offset="0.55" stop-color="#000000" stop-opacity="0.22" />
      <stop offset="1" stop-color="#000000" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="1600" height="600" fill="url(#rm_bg2)" />
  <circle cx="980" cy="290" r="760" fill="url(#rm_center_glow)" />
  <rect width="1600" height="600" fill="url(#rm_dots)" opacity="0.22" />
  <rect width="1600" height="600" fill="url(#rm_vignette2)" />
</svg>
